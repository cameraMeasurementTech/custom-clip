server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker-validator
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # Only scrape this stack's validator container.
      - source_labels: [__meta_docker_container_name]
        regex: ^/nexis-validator$
        action: keep
      - source_labels: [__meta_docker_container_name]
        regex: /(.*)
        replacement: $1
        target_label: container
      - source_labels: [__meta_docker_container_id]
        target_label: container_id
      - target_label: compose_service
        replacement: validator
      - target_label: app
        replacement: nexis-validator
      - target_label: stack
        replacement: nexis
      - target_label: env
        replacement: local
      - target_label: service_name
        replacement: nexis-validator
      - target_label: instance
        replacement: nexis-validator
      - target_label: job
        replacement: nexis-validator
    pipeline_stages:
      - docker: {}
      # Ensure each stream always has labels Loki requires.
      - static_labels:
          job: nexis-validator
          compose_service: validator
